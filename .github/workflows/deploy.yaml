name: Deploy otobz.com

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build image with latest tag
        run: |
          sudo nerdctl --address /run/k3s/containerd/containerd.sock build \
            -t otobz-com:latest .
          sudo nerdctl --address /run/k3s/containerd/containerd.sock save otobz-com:latest \
            | sudo k3s ctr images import -

      - name: Rollout restart
        run: |
          KUBECONFIG=$HOME/.kube/config sudo kubectl rollout restart deployment/otobz-com -n worker
          KUBECONFIG=$HOME/.kube/config sudo kubectl rollout status deployment/otobz-com -n worker --timeout=300s

      - name: Verify
        run: |
          KUBECONFIG=$HOME/.kube/config sudo kubectl get pods -n worker -l app=otobz-com
          curl -sf https://otobz.com > /dev/null && echo "✅ otobz.com is live"
